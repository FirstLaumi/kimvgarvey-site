<script>
  (function(){
    var btn = document.querySelector('.nav-toggle');
    var menu = document.getElementById('nav-menu');
    if (!btn || !menu) return;
    function close(){ menu.classList.remove('open'); btn.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
    function toggle(){
      var isOpen = menu.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }
    btn.addEventListener('click', toggle);
    menu.addEventListener('click', function(e){ if (e.target.tagName === 'A') close(); });
  })();
</script>
  <p class="subpage-intro">Photographs taken while walking — mostly Siesta Key at dawn, occasionally the Jersey Shore. No particular order. All mine.</p>

<script>
  // Random shuffle on load so order changes each visit
  const m = document.getElementById('masonry');
  const kids = Array.from(m.children);
  for (let i = kids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    m.insertBefore(kids[i], kids[j]);
  }
</script>
